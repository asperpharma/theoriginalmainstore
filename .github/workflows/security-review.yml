name: Security Review
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/stores/**"
      - "src/integrations/**"
      - "src/hooks/useAuth*"
      - "src/pages/Auth*"
      - "supabase/**"

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run npm audit
        run: npm audit --json > security-report.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.event.pull_request.number }}
          path: security-report.json
          retention-days: 30


      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Security review for Asper Beauty Shop e-commerce platform.

            ## Critical Checks
            - No Supabase service_role key exposed client-side
            - No Shopify admin tokens in frontend code
            - RLS enabled on any new Supabase tables
            - Input validation on user-facing forms
            - XSS prevention in product descriptions/reviews
            - CSRF protection on state-changing operations

            ## E-Commerce Specific
            - Cart manipulation prevention
            - Price tampering checks
            - COD order validation
            - Customer data protection (GDPR)

            Rate severity: CRITICAL, HIGH, MEDIUM, LOW.
            Post findings with inline comments.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*)"
