<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=820">
<title>Asper Beauty — Facebook Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 820px; height: 312px; overflow: hidden; }

  .canvas {
    width: 820px; height: 312px;
    background: linear-gradient(135deg, #0a0505 0%, #1a0808 40%, #2a0c0c 100%);
    position: relative;
    display: flex; align-items: center;
    padding: 0 60px;
  }

  /* Gold accent lines */
  .gold-line-top { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #C5A028 50%, transparent); }
  .gold-line-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #C5A028 50%, transparent); }

  .left {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: #C5A028; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .eyebrow::before {
    content: ''; width: 24px; height: 1px; background: #C5A028;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 40px; font-weight: 700;
    color: #fff; line-height: 1.1; margin-bottom: 10px;
  }
  .headline span {
    background: linear-gradient(90deg, #C5A028, #e8d48b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subhead {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.6; max-width: 340px;
  }

  .right {
    display: flex; align-items: center; gap: 32px;
  }

  .stat {
    text-align: center;
  }
  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 700;
    color: #C5A028;
  }
  .stat-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); margin-top: 4px;
  }

  .divider {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, rgba(197,160,40,0.3), transparent);
  }

  /* Maroon glow */
  .glow {
    position: absolute; top: 50%; left: 30%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(128,0,32,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="gold-line-top"></div>
  <div class="gold-line-bottom"></div>
  <div class="glow"></div>

  <div class="left">
    <div class="eyebrow">Jordan's No.1 Beauty Destination</div>
    <div class="headline">Where Science<br>Meets <span>Sanctuary</span></div>
    <div class="subhead">Pharmacist-curated luxury skincare. 10,000+ products from 350+ trusted dermocosmetic brands.</div>
  </div>

  <div class="right">
    <div class="stat">
      <div class="stat-value">10K+</div>
      <div class="stat-label">Products</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-value">350+</div>
      <div class="stat-label">Brands</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-value">100%</div>
      <div class="stat-label">Authentic</div>
    </div>
  </div>
</div>
</body>
</html>
