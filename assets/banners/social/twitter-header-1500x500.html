<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1500">
<title>Asper Beauty — Twitter/X Header</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1500px; height: 500px; overflow: hidden; }

  .canvas {
    width: 1500px; height: 500px;
    background: #F8F8FF;
    position: relative;
    display: flex; align-items: center;
    padding: 0 100px;
  }

  /* Neumorphic background panel */
  .neu-panel {
    position: absolute; top: 40px; bottom: 40px; left: 60px; right: 60px;
    border-radius: 32px;
    background: #F8F8FF;
    box-shadow: 16px 16px 32px rgba(0,0,0,0.06), -16px -16px 32px rgba(255,255,255,0.9);
    border: 1px solid rgba(197,160,40,0.1);
  }

  .content {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
  }

  .left { max-width: 700px; }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 600;
    color: #800020; letter-spacing: 0.2em;
    margin-bottom: 16px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 56px; font-weight: 700;
    color: #800020; line-height: 1.1;
    margin-bottom: 16px;
  }
  .headline span { color: #C5A028; }

  .subhead {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px; font-weight: 400;
    color: #555; line-height: 1.6;
    max-width: 500px;
  }

  .right {
    display: flex; gap: 24px;
  }

  .feature-card {
    width: 160px; padding: 28px 20px;
    border-radius: 20px;
    background: #F8F8FF;
    box-shadow: 8px 8px 16px rgba(0,0,0,0.05), -8px -8px 16px rgba(255,255,255,0.8);
    text-align: center;
  }

  .feature-icon {
    width: 40px; height: 40px; margin: 0 auto 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, #800020, #a00030);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 4px 4px 8px rgba(128,0,32,0.2), -2px -2px 6px rgba(255,255,255,0.6);
  }
  .feature-icon svg { width: 18px; height: 18px; color: #fff; }

  .feature-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: #333; margin-bottom: 4px;
  }
  .feature-desc {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; color: #888; line-height: 1.4;
  }

  /* Gold accents */
  .gold-line {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 1px; height: 200px;
    background: linear-gradient(to bottom, transparent, rgba(197,160,40,0.2), transparent);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="neu-panel"></div>

  <div class="content">
    <div class="left">
      <div class="logo">ASPER BEAUTY SHOP</div>
      <div class="headline">Premium <span>Dermocosmetics</span><br>& Clinical Skincare</div>
      <div class="subhead">Jordan's trusted destination for pharmacist-curated beauty. Free delivery in Amman.</div>
    </div>

    <div class="right">
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <div class="feature-title">Authentic</div>
        <div class="feature-desc">100% guaranteed genuine products</div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
        </div>
        <div class="feature-title">Clinical</div>
        <div class="feature-desc">Pharmacist-vetted formulations</div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
        </div>
        <div class="feature-title">10,000+</div>
        <div class="feature-desc">Products from 350+ brands</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
